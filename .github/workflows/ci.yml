name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Computer Modern test fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y texlive-fonts-recommended
          test -n "$(kpsewhich cmr10.tfm)"
          test -n "$(kpsewhich cmr10.pfb)"

      - name: Run Rust test suite
        run: cargo test -q

  web:
    name: Web Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        run: pnpm -C web install --frozen-lockfile

      - name: Install Rust toolchain for viewer integration test
        uses: dtolnay/rust-toolchain@stable

      - name: Restore viewer integration Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: viewer-e2e

      - name: Install WebAssembly target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: v0.14.0

      - name: Install Playwright Chromium
        run: pnpm -C web --filter @latexd/viewer-app exec playwright install --with-deps chromium

      - name: Run web test suite
        run: pnpm -C web test

      - name: Build web workspace
        run: pnpm -C web build

      - name: Run viewer end-to-end test
        run: pnpm -C web test:e2e

      - name: Run static WebAssembly viewer end-to-end test
        env:
          LATEXD_VIEWER_BASE_PATH: /latexd
        run: pnpm -C web test:e2e:wasm

  component-diff:
    name: External component PDF diff
    uses: seo-rii/latexd-tests/.github/workflows/_component-diff.yml@9b0a17d1f4aa4f15e2442930fd302d5a1d538b0e
    with:
      latexd_ref: ${{ github.sha }}
      suite_ref: 9b0a17d1f4aa4f15e2442930fd302d5a1d538b0e
      tier: smoke
    permissions:
      contents: read

  licensed-corpus:
    name: External licensed corpus
    if: github.event_name == 'push'
    uses: seo-rii/latexd-tests/.github/workflows/_test-latexd.yml@9b0a17d1f4aa4f15e2442930fd302d5a1d538b0e
    with:
      latexd_ref: ${{ github.sha }}
      suite_ref: 9b0a17d1f4aa4f15e2442930fd302d5a1d538b0e
      tier: smoke
    permissions:
      contents: read

  renderer-benchmark:
    name: External renderer benchmark
    if: github.event_name == 'push'
    uses: seo-rii/latexd-tests/.github/workflows/_benchmark-latexd.yml@9b0a17d1f4aa4f15e2442930fd302d5a1d538b0e
    with:
      latexd_ref: ${{ github.sha }}
      suite_ref: 9b0a17d1f4aa4f15e2442930fd302d5a1d538b0e
      iterations: 3
    permissions:
      contents: read
