name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Computer Modern test fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y texlive-fonts-recommended
          test -n "$(kpsewhich cmr10.tfm)"
          test -n "$(kpsewhich cmr10.pfb)"

      - name: Run Rust test suite
        run: cargo test -q

  web:
    name: Web Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        run: pnpm -C web install --frozen-lockfile

      - name: Run web test suite
        run: pnpm -C web test

      - name: Build web workspace
        run: pnpm -C web build

  component-diff:
    name: External component PDF diff
    uses: seo-rii/latexd-tests/.github/workflows/_component-diff.yml@d2e8545af386132fc8710bcf84e2d223678bd67c
    with:
      latexd_ref: ${{ github.sha }}
      suite_ref: d2e8545af386132fc8710bcf84e2d223678bd67c
      tier: smoke
    permissions:
      contents: read

  licensed-corpus:
    name: External licensed corpus
    if: github.event_name == 'push'
    uses: seo-rii/latexd-tests/.github/workflows/_test-latexd.yml@d2e8545af386132fc8710bcf84e2d223678bd67c
    with:
      latexd_ref: ${{ github.sha }}
      suite_ref: d2e8545af386132fc8710bcf84e2d223678bd67c
      tier: smoke
    permissions:
      contents: read

  renderer-benchmark:
    name: External renderer benchmark
    if: github.event_name == 'push'
    uses: seo-rii/latexd-tests/.github/workflows/_benchmark-latexd.yml@d2e8545af386132fc8710bcf84e2d223678bd67c
    with:
      latexd_ref: ${{ github.sha }}
      suite_ref: d2e8545af386132fc8710bcf84e2d223678bd67c
      iterations: 3
    permissions:
      contents: read
