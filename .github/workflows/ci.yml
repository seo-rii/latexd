name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Rust test suite
        run: cargo test -q

  web:
    name: Web Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web workspace dependencies
        run: pnpm -C web install --frozen-lockfile

      - name: Run web test suite
        run: pnpm -C web test

      - name: Build web workspace
        run: pnpm -C web build

  licensed-corpus:
    name: External licensed corpus
    if: github.event_name == 'push'
    uses: seo-rii/latexd-tests/.github/workflows/_test-latexd.yml@2bd22ebbb2c74e4dd31a6da821d946e4420e344d
    with:
      latexd_ref: ${{ github.sha }}
      suite_ref: 2bd22ebbb2c74e4dd31a6da821d946e4420e344d
      tier: smoke
    permissions:
      contents: read
